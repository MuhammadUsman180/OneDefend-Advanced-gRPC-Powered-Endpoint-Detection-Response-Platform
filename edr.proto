syntax = "proto3";

service EDRService {
  rpc SendAlert (AlertRequest) returns (AlertResponse);
  rpc CheckHash (HashRequest) returns (HashResponse);
  rpc CheckHashBatch (BatchHashRequest) returns (BatchHashResponse);
  rpc GetCommand (CommandRequest) returns (CommandResponse);
  rpc GetBlockList (BlockRequest) returns (BlockResponse);
  rpc GetUSBPolicy (USBRequest) returns (USBResponse);
  rpc PushFileListing (FileListingRequest) returns (AlertResponse);
  rpc SendScanReport (ScanReportRequest) returns (AlertResponse);
  rpc SendScanProgress (ScanProgressRequest) returns (AlertResponse);
  rpc GetBehaviorRules (BehaviorRequest) returns (BehaviorResponse);
  rpc SendShellOutput (ShellResponse) returns (AlertResponse);
  rpc PushSoftwareInventory (SoftwareInventoryRequest) returns (AlertResponse);
  rpc GetIPScore (IPRequest) returns (IPResponse);
  rpc PushAgentMetadata (MetadataRequest) returns (AlertResponse);
  rpc PushHardwareInventory (HardwareRequest) returns (AlertResponse);
  rpc PushUserInventory (UserInventoryRequest) returns (AlertResponse);
  rpc PushNetworkPorts (PortInventoryRequest) returns (AlertResponse);
  rpc PushCisBenchmark (CisRequest) returns (AlertResponse);
  
}

message ScanProgressRequest { string agent_id = 1; int32 percentage = 2; string current_folder = 3; string scan_type = 4; }
message FileItem { string name = 1; bool is_dir = 2; }
message FileListingRequest { string agent_id = 1; string path = 2; repeated FileItem items = 3; }
message ScanReportRequest { string agent_id = 1; string folder_path = 2; int32 total_files = 3; int32 quarantined_files = 4; string duration = 5; string scan_type = 6; }
message BlockRequest { string agent_id = 1; }
message BlockResponse { repeated string processes = 1; }
message USBRequest { string agent_id = 1; }
message USBResponse { repeated string allowed_device_ids = 1; }
message CommandRequest {
  string agent_id = 1;
  string os_type = 2;
  string ip_address = 3;
  float cpu_usage = 4;    // NEW: Percentage
  float ram_total = 5;    // NEW: Total GB
  float disk_free = 6;    // NEW: Remaining GB
}
message CommandResponse { string command = 1; string argument = 2; string shutdown_password = 3; string daily_scan_time = 4; bool remediation_active = 5; string emergency_password = 6; }
message HashRequest { string hash = 1; }
message HashResponse { bool is_malicious = 1; }
message AlertRequest { string agent_id = 1; string alert_type = 2; string description = 3; string process_name = 4; string os_type = 5; string ip_address = 6; string lineage = 7;  int32 severity = 8; }
message AlertResponse { bool received = 1; }
message BehaviorRequest { string agent_id = 1; }
message BehaviorRule { string parent = 1; string child = 2; }
message BehaviorResponse { repeated BehaviorRule rules = 1; }
message ShellResponse { string agent_id = 1; string output = 2; }
message SoftwareItem { string name = 1; string version = 2; string install_date = 3; }
message SoftwareInventoryRequest { string agent_id = 1; repeated SoftwareItem software = 2; }
message IPRequest { string ip = 1; }
message IPResponse { int32 score = 1; string description = 2; }
message BatchHashRequest { string agent_id = 1; repeated string hashes = 2; }
message BatchHashResponse { repeated string malicious_hashes = 1; }
message MetadataRequest {
  string agent_id = 1;
  string mac_address = 2;
  string ad_domain = 3;
  string kernel_version = 4;
  string os_activation = 5;
  string os_install_date = 6;
}
message HardwareRequest {
  string agent_id = 1;
  string hardware_json = 2;
}
message UserItem {
  string username = 1;
  string status = 2;
  string user_type = 3;
  string role = 4;
  string last_pass_change = 5;
  string last_login = 6;
  string login_history_json = 7; // We store the list here for this user
}

message UserInventoryRequest {
  string agent_id = 1;
  repeated UserItem users = 2;
}
message PortItem {
  string protocol = 1;
  int32 port = 2;
  string process = 3;
  int32 pid = 4;
  bool is_blocked = 5;
}
message PortInventoryRequest {
  string agent_id = 1;
  repeated PortItem ports = 2;
}
message CisItem {
  string name = 1;
  bool passed = 2;
  string details = 3;
}
message CisRequest {
  string agent_id = 1;
  repeated CisItem results = 2;
  int32 score = 3;
}
